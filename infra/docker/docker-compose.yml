# ─────────────────────────────────────────────────────────────────────────────
# Agile-ish local stack.
#
# Default (`pnpm docker:up`) brings up infrastructure only — Postgres, Redis,
# MailHog. You run the API + web from source with hot reload.
#
# Optional profiles:
#   --profile tools  → adds Adminer DB GUI at http://localhost:8080
#   --profile full   → adds containerised API + web (production-like image build)
#
# Example invocations:
#   docker compose --env-file ../../.env up -d
#   docker compose --env-file ../../.env --profile tools up -d
#   docker compose --env-file ../../.env --profile full up -d --build
# ─────────────────────────────────────────────────────────────────────────────

name: agile-ish

services:
  postgres:
    # pgvector image = stock Postgres + pgvector extension preinstalled.
    # citext and pg_trgm come with Postgres and don't need a custom image.
    image: pgvector/pgvector:pg16
    container_name: agile-ish-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Surfaced to the init scripts in /docker-entrypoint-initdb.d.
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    # Redis 7.2 is the last BSD-licensed release. Newer versions moved to
    # SSPL/RSALv2 (source-available, not OSI-OSS). Pin to 7.2 for clean OSS.
    image: redis:7.2-alpine
    container_name: agile-ish-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    # Captures dev emails so signup/verification flows are testable locally.
    # SMTP on 1025, web UI on 8025.
    image: mailhog/mailhog:v1.0.1
    container_name: agile-ish-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  adminer:
    # Optional DB GUI. Enable with `--profile tools`.
    image: adminer:5
    container_name: agile-ish-adminer
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy

  # ───── Production-like containerised app stack (--profile full) ─────────

  api:
    profiles: ["full"]
    container_name: agile-ish-api
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      args:
        NODE_VERSION: "22.13.0"
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      # Override host-mode URLs so containers talk via service names.
      DATABASE_URL: postgresql://app_user:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=10&pool_timeout=20
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      API_HOST: 0.0.0.0
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health/live').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    profiles: ["full"]
    container_name: agile-ish-web
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        NODE_VERSION: "22.13.0"
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
    name: agile-ish-postgres-data
  redis_data:
    name: agile-ish-redis-data
